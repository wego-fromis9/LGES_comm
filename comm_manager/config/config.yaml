network:
  manage_wifi: false
  ssid: B-504
  password: welcome!2005
  min_signal_threshold: 140
mqtt:
  broker_ip: 192.168.0.71
  port: 1883
  client_id: AMR-001
  clean_start: true
  session_expiry_interval_sec: 0
  keep_alive: 20
  inbound_qos: 1
  require_publish_ack: true
  publish_ack_timeout_sec: 5
  max_retries: 10
  retry_interval: 5
  reconnect_backoff:
    min_delay_sec: 1
    max_delay_sec: 30
    multiplier: 1.5
  publish_connection_on_mqtt_connect: true
  manual_reconnect_delay: 2
  disconnect_publish_wait_sec: 1.0
  lwt:
    enabled: true
    delay_interval_sec: 2
    qos: 1
    retain: true
  retained:
    clear_qos: 1
    clear_on_connect: []
    clear_on_normal_shutdown: []
  auth:
    username: ''
    password: ''
    password_env: ''
  tls:
    enabled: false
    ca_certs: ''
    certfile: ''
    keyfile: ''
    insecure: false
  timestamp:
    timezone: UTC
    use_z_suffix_for_utc: true
time_sync:
  source: broker_topic
  ros_state_topic: /comm/time_sync_state
  ros_state_publish_period_sec: 1.0
  apply:
    mqtt_payload_timestamp: true
    system_clock: true
  broker_topic:
    enabled: true
    # If the control side defines a full MQTT topic, set topic instead of topic_suffix.
    # Example: topic: uagv/v2/WEGO/AMR-001/timeSync
    topic: ''
    topic_suffix: timeSync
    # Default expected payload:
    # {"timestamps":[{"id":"control","timestamp":"..."},{"id":"robot","timestamp":"..."}]}
    # Also supports {"control":{"timestamp":"..."},"robot":{"timestamp":"..."}}.
    payload_mode: id_selector
    list_path: timestamps
    id_field: id
    selected_id: control
    direct_object_field: control
    timestamp_field: timestamp
    qos: 1
    accept_retained: false
    wait_for_initial_sync_on_connect: false
    require_before_outbound_publish: true
    initial_sync_timeout_sec: 2.0
    max_offset_sec: 86400
    # 0 means keep the last broker offset until the next MQTT reconnect/update.
    # If the broker sends this topic periodically, set a positive stale timeout.
    stale_after_sec: 0
    log_every_update: false
  system_clock:
    enabled: true
    command: sudo -n /usr/local/sbin/lges-set-time '{timestamp}'
    min_offset_sec: 1.0
    max_offset_sec: 86400
    cooldown_sec: 0
    apply_once: false
    timeout_sec: 5
    dry_run: false
robot:
  manufacturer: WEGO
  serial_number: AMR-001
  version: 2.0.0
runtime:
  lock_file: /tmp/lges_comm_node_AMR-001.lock
inbound:
  auto_response: true
  service_wait_timeout_sec: 0.5
  service_timeout_sec: 3
  response:
    response_types:
      validation_error: ERROR
      service_not_configured: REJECTED
      service_unavailable: REJECTED
      service_timeout: ERROR
      service_exception: ERROR
      service_rejected: REJECTED
      service_error: ERROR
      service_accepted: ACCEPTED
    service_error_message_patterns:
      - error
      - exception
      - fault
      - failed
      - timeout
    actions:
      descriptor_source_fields:
        - actionDescriptor
        - actionDescription
      descriptor_fallback_field: ''
      descriptor_default: ''
  order:
    enabled: true
    service: /recipe/run
    timeout_sec: 0
    sequence:
      deduplicate: true
      require_monotonic_update_id: true
  instant_actions:
    enabled: true
    service: /recipe/instant_action
    default_input_json: '{}'
    action_id_source: route
    fail_fast: true
    routes:
      start_pause:
        action_id: IA_START_PAUSE_001
        service: /recipe/instant_action
      stop_pause:
        action_id: IA_STOP_PAUSE_001
        service: /recipe/instant_action
      start_charge:
        action_id: IA_START_CHARGE_001
        service: /recipe/instant_action
      stop_charge:
        action_id: IA_STOP_CHARGE_001
        service: /recipe/instant_action
      cancel_order:
        action_id: IA_CANCEL_ORDER_001
        service: /recipe/instant_action
      clear_instant_actions:
        action_id: IA_CLEAR_INSTANT_ACTIONS_001
        service: /recipe/instant_action
      request_factsheet:
        action_id: IA_REQUEST_FACTSHEET_001
        mode: publish_backend
  triggers:
    order: /comm/order_received
    instantActions: /comm/instant_actions_received
outbound:
  publisher_owner: backend
  backend_publisher:
    enabled: true
    canonical_state_topic: /lges/state_json
    recipe_query_service: /recipe/query_list
    recipe_list_refresh_sec: 5
    recipe_query_service_wait_sec: 0.2
    require_recipe_list_before_factsheet: true
    current_waypoint_max_age_sec: 3.5
    derive_velocity_from_pose: false
    publish_when_mqtt_disconnected: false
    map_ver_no: 1
    max_factsheet_nodes: 300
    defaults:
      control_state: MANUAL
      operation_state: INIT
      safety_state: NORMAL
    topics:
      mir_state: /mir/state
      mir_errors: /mir/errors_json
      mir_waypoints: /mir/waypoints_json
      mir_current_waypoint: /mir/current_waypoint_json
      system_safety_state: /system/safety_state
      recipe_state: /recipe/state
  state:
    enabled: true
    period_sec: 1
  factsheet:
    enabled: true
    publish_on_start: true
    publish_on_request: true
    initial_delay_sec: 3
    check_period_sec: 5
  visualization:
    enabled: false
    period_sec: 1
    clear_retained_when_disabled: true
